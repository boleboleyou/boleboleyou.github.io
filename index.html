<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将·幸运值计算器 (升级版·含平均值与评语)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a3b2f 0%, #2a5a48 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .calculator {
            max-width: 800px;
            width: 100%;
            background: rgba(248, 241, 229, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 20, 10, 0.6), inset 0 1px 4px rgba(255, 245, 215, 0.6);
            padding: 28px 30px 38px;
            border: 2px solid #d8c29b;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #2c4a3b;
            text-shadow: 2px 2px 0 #d8c8a8;
            letter-spacing: 2px;
            text-align: center;
            word-break: break-word;
        }
        .sub {
            text-align: center;
            font-size: 1.1rem;
            color: #3d2f1b;
            background: #e6d8b5;
            padding: 8px 20px;
            border-radius: 60px;
            margin: 0 0 25px 0;
            font-style: italic;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #b59e6b;
        }
        .sub strong {
            font-family: 'Times New Roman', serif;
            font-size: 1.3rem;
            background: #283b30;
            color: #f7e9c3;
            padding: 2px 12px;
            border-radius: 40px;
            margin: 0 4px;
        }
        .input-panel {
            background: #4d6b56;
            border-radius: 40px;
            padding: 24px 28px;
            border: 3px solid #b7a473;
            box-shadow: inset 0 0 0 2px #2f4d3a, 0 8px 0 #1f3528;
            margin-bottom: 28px;
        }
        .field-row {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 15px 10px;
            margin-bottom: 18px;
        }
        .field-row label {
            width: 100px;
            font-weight: 700;
            color: #fbebb0;
            text-shadow: 2px 2px 0 #294231;
            font-size: 1.3rem;
        }
        .field-row input {
            flex: 1 1 200px;
            background: #faf3db;
            border: 3px solid #b48b4b;
            border-radius: 60px;
            padding: 12px 22px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a3b2b;
            outline: none;
            box-shadow: inset 0 3px 8px #a0916b, 0 3px 0 #51482b;
            transition: all 0.1s;
            font-family: 'Courier New', monospace;
        }
        .field-row input:focus {
            background: #fffaec;
            border-color: #d9b155;
            box-shadow: inset 0 3px 8px #9b894b, 0 4px 0 #6b562c;
        }
        .field-row .hint {
            color: #ffddbb;
            font-size: 0.9rem;
            font-weight: 500;
            background: #1e3a2b;
            padding: 5px 15px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .button-box {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .calc-btn {
            background: #f5c452;
            border: none;
            border-radius: 60px;
            padding: 18px 45px;
            font-size: 2rem;
            font-weight: 800;
            color: #1f4d2b;
            text-shadow: 2px 2px 0 #ffe19e;
            box-shadow: 0 8px 0 #9e722b, 0 10px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.07s linear;
            letter-spacing: 2px;
            border: 2px solid #ffdc97;
        }
        .calc-btn:hover {
            background: #ffda7c;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #9e722b, 0 15px 20px rgba(0,0,0,0.3);
        }
        .calc-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #9e722b, 0 8px 12px rgba(0,0,0,0.3);
        }
        .result-panel {
            background: #2f4e3c;
            border-radius: 40px 40px 30px 30px;
            padding: 22px 25px;
            border: 3px solid #c8aa6b;
            box-shadow: inset 0 0 0 2px #1d3527, 0 6px 0 #143021;
            margin-top: 18px;
        }
        .luck-index {
            background: #eedbba;
            border-radius: 40px;
            padding: 20px 20px;
            text-align: center;
            border: 3px solid #aa8749;
            margin-bottom: 18px;
        }
        .luck-index .label {
            font-size: 1.7rem;
            font-weight: 200;
            color: #332915;
            letter-spacing: 3px;
        }
        .luck-index .value {
            font-size: 4.5rem;
            font-weight: 800;
            font-family: 'Times New Roman', serif;
            color: #1d4b28;
            text-shadow: 3px 3px 0 #bca459;
            line-height: 1.2;
            word-break: break-word;
        }
        .avg-panel {
            background: #dacaa4;
            border-radius: 30px;
            padding: 18px 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 12px;
            border: 2px solid #b39250;
            margin-bottom: 15px;
        }
        .avg-item {
            background: #3e614b;
            border-radius: 50px;
            padding: 12px 18px;
            color: #fff5cf;
            font-weight: 600;
            min-width: 170px;
            text-align: center;
            box-shadow: inset 0 2px 5px #1f3327, 0 4px 0 #1b2b20;
        }
        .avg-item span {
            display: block;
            font-size: 1.9rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            color: #fedb7a;
            line-height: 1.3;
        }
        .verdict {
            background: #b59e6b;
            border-radius: 40px;
            padding: 16px 22px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #1d331f;
            text-align: center;
            border: 3px solid #eedba5;
            box-shadow: inset 0 2px 5px #7f653a;
        }
        .formula-note {
            font-size: 0.95rem;
            background: #b8bb8b;
            padding: 12px 18px;
            border-radius: 30px;
            color: #1d341d;
            border: 1px solid #ebd49b;
            margin-top: 15px;
            text-align: center;
        }
        .formula-note code {
            background: #263f2a;
            color: #f2e0b0;
            padding: 3px 8px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            color: #ddd0a3;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🀄️ 麻 · 将 · 幸 · 运 · 值 ·  PRO 🀄️</h1>
        <div class="sub"><strong>Luck Index</strong> = P(M<sub>P</sub>|H₁) / P(M<sub>P</sub>|H₀)</div>
        
        <div class="input-panel">
            <div class="field-row">
                <label>🔢 局数 P</label>
                <input type="number" id="pInput" value="40" min="1" step="1">
                <span class="hint">正整数</span>
            </div>
            <div class="field-row">
                <label>🃏 总万能牌 k</label>
                <input type="number" id="kInput" value="59" min="0" max="1000" step="1">
                <span class="hint">0 ~ 7·P</span>
            </div>
            <div class="field-row">
                <label>🧪 μ (H₁)</label>
                <input type="number" id="muInput" value="3.0" min="0.1" max="20" step="0.1">
                <span class="hint">默认 3.0</span>
            </div>
            <div class="field-row">
                <label>⚙️ λ (H₀)</label>
                <input type="number" id="lambdaInput" value="100.0" min="10" max="500" step="1">
                <span class="hint">默认 100</span>
            </div>
            <div class="button-box">
                <button class="calc-btn" id="calcBtn">⚡ 算 运 ⚡</button>
            </div>
        </div>

        <div class="result-panel">
            <div class="luck-index">
                <div class="label">🍀 幸运指数 🍀</div>
                <div class="value" id="luckValue">—</div>
            </div>

            <!-- 新增：平均对比区域 -->
            <div class="avg-panel" id="avgPanel">
                <div class="avg-item">你的平均 <span id="yourAvg">—</span></div>
                <div class="avg-item">H₀ 理论平均 <span id="h0Avg">—</span></div>
                <div class="avg-item">H₁ 理论平均 <span id="h1Avg">—</span></div>
            </div>

            <!-- 新增：评语区域 -->
            <div class="verdict" id="verdictMsg">等待计算...</div>

            <div class="formula-note">
                <code> 单局万能牌0~7 · 截断泊松(H₁) vs 复杂卷积(H₀) · 参数μ/λ可调 </code>
            </div>
        </div>
        <footer>⚡ 幸运指数 ≥3 弱证据 · ≥10 中等证据 · ≥30 准备赢钱 ⚡</footer>
    </div>

    <script>
        (function() {
            // ---------- 预计算阶乘对数 (最大支持到 2000 保证安全) ----------
            const MAX_FACT = 2000;
            const logFact = new Array(MAX_FACT + 1).fill(0);
            for (let i = 1; i <= MAX_FACT; i++) {
                logFact[i] = logFact[i-1] + Math.log(i);
            }

            function logC(n, k) {
                if (k < 0 || k > n || n < 0) return -Infinity;
                return logFact[n] - logFact[k] - logFact[n - k];
            }

            function logSumExp(logValues) {
                let maxVal = -Infinity;
                for (let v of logValues) if (v > maxVal) maxVal = v;
                if (maxVal === -Infinity) return -Infinity;
                let sumExp = 0;
                for (let v of logValues) if (v > -Infinity) sumExp += Math.exp(v - maxVal);
                return maxVal + Math.log(sumExp);
            }

            // ---------- 计算单局分布 (H0 下，参数 lambda) 返回概率数组 [0..7] 以及均值 ----------
            function computeOneRoundDistrib(lambda) {
                const logProbK = new Array(8).fill(-Infinity);

                for (let s = 2; s <= 12; s++) {
                    const w = (6 - Math.abs(s - 7)) / 36;
                    if (w <= 0) continue;
                    const logW = Math.log(w);

                    const nMin = 53;
                    const nMax = 136 - 2 * s;
                    if (nMax < nMin) continue;

                    // 计算 Z(s) = sum_{n=53}^{nMax} λ^n / n!
                    const logTermsZ = [];
                    for (let n = nMin; n <= nMax; n++) {
                        logTermsZ.push(n * Math.log(lambda) - logFact[n]);
                    }
                    const logZ = logSumExp(logTermsZ);
                    if (logZ === -Infinity) continue;

                    for (let n = nMin; n <= nMax; n++) {
                        const logLambdaTerm = n * Math.log(lambda) - logFact[n];
                        const logGivenS = logLambdaTerm - logZ;   // P(n|s)

                        const floorN4 = Math.floor(n / 4);
                        if (floorN4 > 136 - 2*s) continue;

                        for (let m = 0; m <= 7; m++) {
                            const logC7m = logC(7, m);
                            if (logC7m === -Infinity) continue;

                            const firstCombiArg = 128; // 135-7
                            const secondIndex = 136 - 2*s - m;
                            if (secondIndex < 0 || secondIndex > firstCombiArg) continue;
                            const logC128 = logC(firstCombiArg, secondIndex);
                            if (logC128 === -Infinity) continue;

                            const logC135total = logC(135, 136 - 2*s);
                            if (logC135total === -Infinity) continue;

                            const logDenomHyper = logC(136 - 2*s, floorN4);
                            if (logDenomHyper === -Infinity) continue;

                            for (let k = 0; k <= 7; k++) {
                                if (k > m) continue;
                                const logCm_k = logC(m, k);
                                if (logCm_k === -Infinity) continue;

                                const remaining = 136 - 2*s - m;
                                const need = floorN4 - k;
                                if (need < 0 || need > remaining) continue;
                                const logCrem_need = logC(remaining, need);
                                if (logCrem_need === -Infinity) continue;

                                const logHyper = logCm_k + logCrem_need - logDenomHyper;

                                let logTerm = logW + logGivenS + (logC7m + logC128 - logC135total) + logHyper;

                                // 合并到 logProbK[k]
                                if (logTerm > -Infinity) {
                                    if (logProbK[k] === -Infinity) {
                                        logProbK[k] = logTerm;
                                    } else {
                                        const a = logProbK[k];
                                        const b = logTerm;
                                        if (a > b) {
                                            logProbK[k] = a + Math.log(1 + Math.exp(b - a));
                                        } else {
                                            logProbK[k] = b + Math.log(1 + Math.exp(a - b));
                                        }
                                    }
                                }
                            }
                        }
                    }
                }

                // 归一化得到概率
                let maxLog = Math.max(...logProbK);
                if (maxLog === -Infinity) return { prob: new Array(8).fill(1/8), mean: 3.5 }; // 保底

                let expVals = new Array(8);
                let sumExp = 0;
                for (let i = 0; i < 8; i++) {
                    expVals[i] = logProbK[i] === -Infinity ? 0 : Math.exp(logProbK[i] - maxLog);
                    sumExp += expVals[i];
                }
                for (let i = 0; i < 8; i++) expVals[i] /= sumExp;

                // 计算均值
                let mean = 0;
                for (let i = 0; i < 8; i++) mean += i * expVals[i];
                return { prob: expVals, mean: mean };
            }

            // 卷积函数
            function convolveDist(dist, n) {
                if (n === 0) return [1];
                let result = [1.0];
                for (let i = 0; i < n; i++) {
                    const newLen = result.length + dist.length - 1;
                    const next = new Array(newLen).fill(0);
                    for (let x = 0; x < result.length; x++) {
                        if (result[x] === 0) continue;
                        for (let d = 0; d < dist.length; d++) {
                            if (dist[d] === 0) continue;
                            next[x + d] += result[x] * dist[d];
                        }
                    }
                    result = next;
                }
                return result;
            }

            // 分子概率 (截断泊松 H1)
            function probH1(P, mu, k) {
                const pMu = P * mu;
                const maxK = 7 * P;
                if (k < 0 || k > maxK) return 0;

                const logProbK = k * Math.log(pMu) - pMu - logFact[k];

                let logNorm = -Infinity;
                for (let i = 0; i <= maxK; i++) {
                    const logTerm = i * Math.log(pMu) - pMu - logFact[i];
                    if (logNorm === -Infinity) logNorm = logTerm;
                    else {
                        const a = logNorm, b = logTerm;
                        logNorm = a > b ? a + Math.log(1 + Math.exp(b - a)) : b + Math.log(1 + Math.exp(a - b));
                    }
                }
                return Math.exp(logProbK - logNorm);
            }

            // 计算理论平均(H1): 截断泊松的期望 (近似，直接使用截断前的pμ，因为截断影响很小)
            function meanH1(P, mu) {
                return P * mu; // 近似，实际截断后略小，但作为展示足够了
            }

            // ---------- 主计算函数 ----------
            function computeLuckIndex(P, k, mu, lambda) {
                // 1. 单局分布 (H0)
                const { prob: oneDist, mean: mean0 } = computeOneRoundDistrib(lambda);
                // 2. P重卷积
                const totalDist = convolveDist(oneDist, P);
                // 3. 分母概率
                const p0 = (k >= 0 && k < totalDist.length) ? totalDist[k] : 0;
                // 4. 分子概率
                const p1 = probH1(P, mu, k);
                // 5. 理论平均 H0
                const theoryH0 = mean0 * P;
                // 6. 理论平均 H1 (近似)
                const theoryH1 = meanH1(P, mu);

                return { p1, p0, index: p0 === 0 ? (p1 > 0 ? Infinity : NaN) : p1 / p0, theoryH0, theoryH1, oneDist };
            }

            // ---------- UI 绑定 ----------
            const pInput = document.getElementById('pInput');
            const kInput = document.getElementById('kInput');
            const muInput = document.getElementById('muInput');
            const lambdaInput = document.getElementById('lambdaInput');
            const calcBtn = document.getElementById('calcBtn');

            const luckSpan = document.getElementById('luckValue');
            const yourAvgSpan = document.getElementById('yourAvg');
            const h0AvgSpan = document.getElementById('h0Avg');
            const h1AvgSpan = document.getElementById('h1Avg');
            const verdictSpan = document.getElementById('verdictMsg');

            function updateLuck() {
                let P = parseInt(pInput.value, 10);
                let k = parseInt(kInput.value, 10);
                let mu = parseFloat(muInput.value);
                let lambda = parseFloat(lambdaInput.value);

                if (isNaN(P) || P < 1) P = 1;
                if (isNaN(k) || k < 0) k = 0;
                if (isNaN(mu) || mu <= 0) mu = 3.0;
                if (isNaN(lambda) || lambda <= 0) lambda = 100.0;

                // 检查k是否超过可能最大值 (7*P)
                const maxPossible = 7 * P;
                if (k > maxPossible) {
                    alert(`总万能牌数 k 不能超过 ${maxPossible} (7×局数) ，请调整。`);
                    return;
                }

                // 显示计算中
                luckSpan.textContent = "🔄 ...";
                yourAvgSpan.textContent = "⋯";
                h0AvgSpan.textContent = "⋯";
                h1AvgSpan.textContent = "⋯";
                verdictSpan.textContent = "计算中，请稍候...";

                setTimeout(() => {
                    try {
                        const { p1, p0, index, theoryH0, theoryH1, oneDist } = computeLuckIndex(P, k, mu, lambda);

                        // 幸运指数显示
                        if (index === Infinity) luckSpan.textContent = "∞";
                        else if (isNaN(index)) luckSpan.textContent = "⚠️ 分母为零";
                        else {
                            if (Math.abs(index) > 1e4 || (Math.abs(index) < 1e-3 && index !== 0)) {
                                luckSpan.textContent = index.toExponential(4);
                            } else {
                                luckSpan.textContent = index.toFixed(6);
                            }
                        }

                        // 平均显示
                        const yourAvg = (k / P).toFixed(3);
                        yourAvgSpan.textContent = yourAvg;
                        h0AvgSpan.textContent = theoryH0.toFixed(3);
                        h1AvgSpan.textContent = theoryH1.toFixed(3);

                        // 评语
                        let verdict = "";
                        if (isNaN(index) || index === Infinity) verdict = "⚠️ 无法判断";
                        else if (index < 3) verdict = "🔹 无证据支持你运气更好 (幸运指数 < 3)";
                        else if (index < 10) verdict = "🔸 有较弱证据支持你运气更好 (3 ≤ 指数 < 10)";
                        else if (index < 30) verdict = "🔶 有中等强度证据支持你运气更好 (10 ≤ 指数 < 30)";
                        else verdict = "💰💰 今天别走了，准备赢钱吧！ (指数 ≥ 30) 💰💰";
                        verdictSpan.textContent = verdict;

                    } catch (e) {
                        console.error(e);
                        luckSpan.textContent = "❌ 异常";
                        verdictSpan.textContent = "计算过程出错，请检查参数";
                    }
                }, 30);
            }

            calcBtn.addEventListener('click', updateLuck);
            [pInput, kInput, muInput, lambdaInput].forEach(inp => inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') updateLuck();
            }));

            // 初始计算 (以40,59为例)
            updateLuck();
        })();
    </script>
</body>
</html>
