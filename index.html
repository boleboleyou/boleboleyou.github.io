<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将·幸运值计算器 (万能牌分布)</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1a3b2f 0%, #2a5a48 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .calculator {
            max-width: 720px;
            width: 100%;
            background: rgba(248, 241, 229, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 40px -10px rgba(0, 20, 10, 0.6), inset 0 1px 4px rgba(255, 245, 215, 0.6);
            padding: 28px 30px 38px;
            border: 2px solid #d8c29b;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #2c4a3b;
            text-shadow: 2px 2px 0 #d8c8a8;
            letter-spacing: 2px;
            text-align: center;
            word-break: break-word;
        }
        .sub {
            text-align: center;
            font-size: 1.1rem;
            color: #3d2f1b;
            background: #e6d8b5;
            padding: 8px 20px;
            border-radius: 60px;
            margin: 0 0 25px 0;
            font-style: italic;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #b59e6b;
        }
        .sub strong {
            font-family: 'Times New Roman', serif;
            font-size: 1.3rem;
            background: #283b30;
            color: #f7e9c3;
            padding: 2px 12px;
            border-radius: 40px;
            margin: 0 4px;
        }
        .input-panel {
            background: #4d6b56;
            border-radius: 40px;
            padding: 24px 28px;
            border: 3px solid #b7a473;
            box-shadow: inset 0 0 0 2px #2f4d3a, 0 8px 0 #1f3528;
            margin-bottom: 28px;
        }
        .field-row {
            display: flex;
            flex-wrap: wrap;
            align-items: baseline;
            gap: 15px 10px;
            margin-bottom: 18px;
        }
        .field-row label {
            width: 100px;
            font-weight: 700;
            color: #fbebb0;
            text-shadow: 2px 2px 0 #294231;
            font-size: 1.3rem;
        }
        .field-row input {
            flex: 1 1 200px;
            background: #faf3db;
            border: 3px solid #b48b4b;
            border-radius: 60px;
            padding: 12px 22px;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a3b2b;
            outline: none;
            box-shadow: inset 0 3px 8px #a0916b, 0 3px 0 #51482b;
            transition: all 0.1s;
            font-family: 'Courier New', monospace;
        }
        .field-row input:focus {
            background: #fffaec;
            border-color: #d9b155;
            box-shadow: inset 0 3px 8px #9b894b, 0 4px 0 #6b562c;
        }
        .field-row .hint {
            color: #ffddbb;
            font-size: 0.9rem;
            font-weight: 500;
            background: #1e3a2b;
            padding: 5px 15px;
            border-radius: 30px;
            white-space: nowrap;
        }
        .button-box {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }
        .calc-btn {
            background: #f5c452;
            border: none;
            border-radius: 60px;
            padding: 18px 45px;
            font-size: 2rem;
            font-weight: 800;
            color: #1f4d2b;
            text-shadow: 2px 2px 0 #ffe19e;
            box-shadow: 0 8px 0 #9e722b, 0 10px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: 0.07s linear;
            letter-spacing: 2px;
            border: 2px solid #ffdc97;
        }
        .calc-btn:hover {
            background: #ffda7c;
            transform: translateY(-3px);
            box-shadow: 0 11px 0 #9e722b, 0 15px 20px rgba(0,0,0,0.3);
        }
        .calc-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #9e722b, 0 8px 12px rgba(0,0,0,0.3);
        }
        .result-panel {
            background: #2f4e3c;
            border-radius: 40px 40px 30px 30px;
            padding: 22px 25px;
            border: 3px solid #c8aa6b;
            box-shadow: inset 0 0 0 2px #1d3527, 0 6px 0 #143021;
            margin-top: 18px;
        }
        .luck-index {
            background: #eedbba;
            border-radius: 40px;
            padding: 25px 20px;
            text-align: center;
            border: 3px solid #aa8749;
        }
        .luck-index .label {
            font-size: 1.7rem;
            font-weight: 200;
            color: #332915;
            letter-spacing: 3px;
        }
        .luck-index .value {
            font-size: 4.5rem;
            font-weight: 800;
            font-family: 'Times New Roman', serif;
            color: #1d4b28;
            text-shadow: 3px 3px 0 #bca459;
            line-height: 1.2;
            word-break: break-word;
        }
        .formula-note {
            font-size: 0.95rem;
            background: #b8bb8b;
            padding: 12px 18px;
            border-radius: 30px;
            color: #1d341d;
            border: 1px solid #ebd49b;
            margin-top: 15px;
            text-align: center;
        }
        .formula-note code {
            background: #263f2a;
            color: #f2e0b0;
            padding: 3px 8px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 0.9rem;
        }
        footer {
            text-align: center;
            color: #ddd0a3;
            margin-top: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🀄️ 麻 · 将 · 幸 · 运 · 值 🀄️</h1>
        <div class="sub"><strong>Luck Index</strong> = P(M<sub>P</sub>|H₁) / P(M<sub>P</sub>|H₀)</div>
        
        <div class="input-panel">
            <div class="field-row">
                <label>🔢 局数 P</label>
                <input type="number" id="pInput" value="3" min="1" max="20" step="1">
                <span class="hint">1 ~ 20 局</span>
            </div>
            <div class="field-row">
                <label>🃏 总万能牌 k</label>
                <input type="number" id="kInput" value="5" min="0" max="140" step="1">
                <span class="hint">0 ~ 7·P</span>
            </div>
            <div class="field-row">
                <label>🧪 μ (H₁)</label>
                <input type="number" id="muInput" value="3.0" min="0.1" max="20" step="0.1">
                <span class="hint">默认 3.0</span>
            </div>
            <div class="field-row">
                <label>⚙️ λ (H₀)</label>
                <input type="number" id="lambdaInput" value="100.0" min="10" max="500" step="1">
                <span class="hint">默认 100</span>
            </div>
            <div class="button-box">
                <button class="calc-btn" id="calcBtn">⚡ 算 运 ⚡</button>
            </div>
        </div>

        <div class="result-panel">
            <div class="luck-index">
                <div class="label">🍀 幸运指数 🍀</div>
                <div class="value" id="luckValue">—</div>
            </div>
            <div class="formula-note">
                <code> M<sub>P</sub> = k · H₁: 截断泊松(μ·P) · H₀: P重卷积(单局分布|λ) </code>
            </div>
        </div>
        <footer>⚙️ 单局万能牌范围 0～7 · 卷积计算 · 参数可调</footer>
    </div>

    <script>
        (function() {
            // ---------- 预计算阶乘对数 (最大支持到 1500 保证安全) ----------
            const MAX_FACT = 2000;
            const logFact = new Array(MAX_FACT + 1).fill(0);
            for (let i = 1; i <= MAX_FACT; i++) {
                logFact[i] = logFact[i-1] + Math.log(i);
            }

            // 安全组合数对数 (若无效返回 -Infinity)
            function logC(n, k) {
                if (k < 0 || k > n || n < 0) return -Infinity;
                // 使用阶乘对数
                return logFact[n] - logFact[k] - logFact[n - k];
            }

            // log-sum-exp 技巧 (输入数组可能包含 -Infinity)
            function logSumExp(logValues) {
                let maxVal = -Infinity;
                for (let v of logValues) {
                    if (v > maxVal) maxVal = v;
                }
                if (maxVal === -Infinity) return -Infinity; // 所有项无效
                let sumExp = 0;
                for (let v of logValues) {
                    if (v > -Infinity) {
                        sumExp += Math.exp(v - maxVal);
                    }
                }
                return maxVal + Math.log(sumExp);
            }

            // ---------- 计算单局分布 (H0 下，参数 lambda) 返回数组 P(M_A = k)  k = 0..7 ----------
            function computeOneRoundDistrib(lambda) {
                // 结果数组 (对数域累积)
                const logProbK = new Array(8).fill(-Infinity);

                // 遍历 s = 2 .. 12
                for (let s = 2; s <= 12; s++) {
                    const w = (6 - Math.abs(s - 7)) / 36;      // 权重 (6-|s-7|)/36
                    if (w <= 0) continue;
                    const logW = Math.log(w);

                    // 计算 Z(s) = sum_{n=53}^{136-2s} λ^n / n!
                    const nMin = 53;
                    const nMax = 136 - 2 * s;
                    if (nMax < nMin) continue;

                    // 收集 n 的对数项用于 logZ
                    const logTermsForZ = [];
                    for (let n = nMin; n <= nMax; n++) {
                        const logTerm = n * Math.log(lambda) - logFact[n];
                        logTermsForZ.push(logTerm);
                    }
                    const logZ = logSumExp(logTermsForZ);
                    if (logZ === -Infinity) continue; // Z(s) 为零不可能，但防御

                    // 遍历 n
                    for (let n = nMin; n <= nMax; n++) {
                        const logLambdaTerm = n * Math.log(lambda) - logFact[n]; // λ^n/n! 对数
                        // 内部减去 logZ => 条件概率
                        const logGivenS = logLambdaTerm - logZ; 

                        const floorN4 = Math.floor(n / 4);
                        // 限制 floorN4 有效性
                        if (floorN4 > 136 - 2 * s) continue; 

                        // 遍历 m = 0..7
                        for (let m = 0; m <= 7; m++) {
                            // 组合数 C(7,m)
                            const logC7m = logC(7, m);
                            if (logC7m === -Infinity) continue;

                            // C(128, 136-2s-m)  注意 135-7 = 128
                            const firstCombiArg = 128; // 135-7
                            const secondIndex = 136 - 2*s - m;
                            if (secondIndex < 0 || secondIndex > firstCombiArg) continue; // 组合无效
                            const logC128 = logC(firstCombiArg, secondIndex);
                            if (logC128 === -Infinity) continue;

                            // C(135, 136-2s) 作为分母
                            const logC135total = logC(135, 136 - 2*s);
                            if (logC135total === -Infinity) continue;

                            // 超几何部分: C(m, k) * C(136-2s-m, floorN4 - k) / C(136-2s, floorN4)
                            // 但这里 k 未知, 我们针对每个 k 累加. 将内部求和放到 k 循环
                            // 先提取公共分母 log( C(136-2s, floorN4) )
                            const logDenomHyper = logC(136 - 2*s, floorN4);
                            if (logDenomHyper === -Infinity) continue;

                            // 对每个 k=0..7 内层求和 (实际上公式中 m 循环在内, 但这里我们把 k 循环放在最外面)
                            // 我们在此处已经固定 s,n,m, 内层本来是对 m 求和, 但还有组合C(m,k)... 
                            // 实际上原式: sum_s sum_n [ ... * sum_m [ ... * C(m,k) * C(...)/C(...) ] ]
                            // 所以我们继续对 k 循环, 将贡献加入 logProbK[k]
                            for (let k = 0; k <= 7; k++) {
                                // 组合 C(m, k)
                                if (k > m) continue; 
                                const logCm_k = logC(m, k);
                                if (logCm_k === -Infinity) continue;

                                // C(136-2s-m, floorN4 - k)
                                const remaining = 136 - 2*s - m;
                                const need = floorN4 - k;
                                if (need < 0 || need > remaining) continue;
                                const logCrem_need = logC(remaining, need);
                                if (logCrem_need === -Infinity) continue;

                                // 分子超几何部分: logCm_k + logCrem_need - logDenomHyper
                                const logHyper = logCm_k + logCrem_need - logDenomHyper;

                                // 整项对数: logW + logGivenS + [logC7m + logC128 - logC135total] + logHyper
                                let logTerm = logW + logGivenS + (logC7m + logC128 - logC135total) + logHyper;

                                // 累加到 logProbK[k]  (log-sum-exp)
                                if (logTerm > -Infinity) {
                                    if (logProbK[k] === -Infinity) {
                                        logProbK[k] = logTerm;
                                    } else {
                                        // 合并两个对数: 直接采用 logSumExp 小规模合并, 但频繁调用慢; 手动合并
                                        // 采用常用方式: 设 a = logProbK[k], b = logTerm, 合并为 max + log(1+exp(差))
                                        const a = logProbK[k];
                                        const b = logTerm;
                                        if (a > b) {
                                            logProbK[k] = a + Math.log(1 + Math.exp(b - a));
                                        } else {
                                            logProbK[k] = b + Math.log(1 + Math.exp(a - b));
                                        }
                                    }
                                }
                            } // k 循环
                        } // m 循环
                    } // n 循环
                } // s 循环

                // 将对数概率转为真实概率，并归一化
                let maxLog = Math.max(...logProbK);
                if (maxLog === -Infinity) {
                    // 保底均匀（实际不会发生）
                    return new Array(8).fill(1/8);
                }
                let expVals = new Array(8);
                let sumExp = 0;
                for (let i = 0; i < 8; i++) {
                    if (logProbK[i] === -Infinity) {
                        expVals[i] = 0;
                    } else {
                        expVals[i] = Math.exp(logProbK[i] - maxLog);
                        sumExp += expVals[i];
                    }
                }
                // 归一化
                for (let i = 0; i < 8; i++) {
                    expVals[i] = sumExp > 0 ? expVals[i] / sumExp : 0;
                }
                return expVals; // 概率数组 [0..7]
            }

            // ---------- 卷积函数: 将分布 dist 卷积 n 次 (n>=1) ----------
            function convolveDist(dist, n) {
                if (n === 0) return [1]; // 零局(不会用到)
                // dist 是概率数组, 索引为取值 0..len-1
                let result = [1.0]; // 0 局时 P(M=0)=1
                for (let i = 0; i < n; i++) {
                    const newLen = result.length + dist.length - 1;
                    const next = new Array(newLen).fill(0);
                    // 卷积: next[t] = sum_{x} result[x] * dist[t-x]
                    for (let x = 0; x < result.length; x++) {
                        if (result[x] === 0) continue;
                        for (let d = 0; d < dist.length; d++) {
                            if (dist[d] === 0) continue;
                            next[x + d] += result[x] * dist[d];
                        }
                    }
                    result = next;
                }
                return result;
            }

            // ---------- 分子概率 (截断泊松 H1) ----------
            function probH1(P, mu, k) {
                const pMu = P * mu;
                const maxK = 7 * P; // 最大可能万能牌数
                if (k < 0 || k > maxK) return 0;
                // 计算未归一化的泊松值: (pMu)^k * e^{-pMu} / k!
                const logProbK = k * Math.log(pMu) - pMu - logFact[k];
                // 计算归一化常数 Z = sum_{i=0}^{7P} (pMu)^i e^{-pMu} / i!
                let logNorm = -Infinity;
                for (let i = 0; i <= maxK; i++) {
                    const logTerm = i * Math.log(pMu) - pMu - logFact[i];
                    if (logNorm === -Infinity) {
                        logNorm = logTerm;
                    } else {
                        const a = logNorm;
                        const b = logTerm;
                        if (a > b) {
                            logNorm = a + Math.log(1 + Math.exp(b - a));
                        } else {
                            logNorm = b + Math.log(1 + Math.exp(a - b));
                        }
                    }
                }
                const prob = Math.exp(logProbK - logNorm);
                return prob;
            }

            // ---------- 分母概率: 从卷积结果中查找 ----------
            function probH0(convDist, k) {
                if (k < 0 || k >= convDist.length) return 0;
                return convDist[k];
            }

            // ---------- 主计算函数 ----------
            function computeLuckIndex(P, k, mu, lambda) {
                // 1. 计算单局分布 (H0)
                const oneDist = computeOneRoundDistrib(lambda);
                // 2. 计算 P 重卷积
                const totalDist = convolveDist(oneDist, P);
                // 3. 分母概率
                const p0 = probH0(totalDist, k);
                // 4. 分子概率
                const p1 = probH1(P, mu, k);

                if (p0 === 0) {
                    return p1 > 0 ? Infinity : NaN;
                }
                return p1 / p0;
            }

            // ---------- UI 绑定 ----------
            const pInput = document.getElementById('pInput');
            const kInput = document.getElementById('kInput');
            const muInput = document.getElementById('muInput');
            const lambdaInput = document.getElementById('lambdaInput');
            const calcBtn = document.getElementById('calcBtn');
            const luckSpan = document.getElementById('luckValue');

            function updateLuck() {
                let P = parseInt(pInput.value, 10);
                let k = parseInt(kInput.value, 10);
                let mu = parseFloat(muInput.value);
                let lambda = parseFloat(lambdaInput.value);

                // 基本校验
                if (isNaN(P) || P < 1) P = 1;
                if (isNaN(k) || k < 0) k = 0;
                if (isNaN(mu) || mu <= 0) mu = 3.0;
                if (isNaN(lambda) || lambda <= 0) lambda = 100.0;

                // 建议P不要太大防止卡顿
                if (P > 30) {
                    if (!confirm(`局数 P = ${P} 较大，卷积计算可能需要几秒钟，是否继续？`)) {
                        return;
                    }
                }

                // 显示计算中
                luckSpan.textContent = "🔄 计算中 ...";

                // 稍微延迟避免阻塞UI
                setTimeout(() => {
                    try {
                        const index = computeLuckIndex(P, k, mu, lambda);
                        if (index === Infinity) {
                            luckSpan.textContent = "∞ 无限大";
                        } else if (isNaN(index)) {
                            luckSpan.textContent = "⚠️ 分母为零";
                        } else {
                            // 格式化：保留6位有效数字或科学计数
                            if (Math.abs(index) > 1e4 || (Math.abs(index) < 1e-3 && index !== 0)) {
                                luckSpan.textContent = index.toExponential(4);
                            } else {
                                luckSpan.textContent = index.toFixed(6);
                            }
                        }
                    } catch (e) {
                        console.error(e);
                        luckSpan.textContent = "❌ 计算异常";
                    }
                }, 30);
            }

            calcBtn.addEventListener('click', updateLuck);
            // 回车触发
            [pInput, kInput, muInput, lambdaInput].forEach(inp => inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') updateLuck();
            }));

            // 初始计算一次
            updateLuck();
        })();
    </script>
</body>
</html>
