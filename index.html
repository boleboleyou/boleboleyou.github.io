<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻将万能牌 · 贝叶斯幸运检验 · 计算器原型</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #eef2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .calculator-card {
            max-width: 720px;
            width: 100%;
            background: #ffffff;
            border-radius: 2.5rem;
            box-shadow: 0 20px 40px -12px rgba(0,20,30,0.25);
            padding: 2.2rem 2.5rem;
            transition: all 0.2s ease;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1a2e3b;
            margin-bottom: 0.2rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e6edf2;
        }
        .subhead {
            color: #2c4c5e;
            font-size: 0.95rem;
            font-weight: 400;
            margin-top: -0.2rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .subhead span {
            background: #d9e7f0;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #144a66;
        }
        .section {
            background: #f8fbfe;
            border-radius: 1.8rem;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2rem;
            border: 1px solid #dde7ed;
        }
        .section h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e3b4a;
            margin-top: 0;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .section h2::before {
            content: '';
            width: 6px;
            height: 1.8rem;
            background: #2f7c9e;
            border-radius: 6px;
        }
        .input-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem 1rem;
            margin-bottom: 1rem;
        }
        .input-row label {
            font-weight: 500;
            color: #1f4457;
            min-width: 160px;
            font-size: 1.05rem;
        }
        .input-row label i {
            font-style: normal;
            color: #0b3b4f;
            background: #e2ecf3;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            margin-left: 0.4rem;
            font-size: 0.85rem;
            font-weight: 400;
        }
        .input-row input[type="number"] {
            padding: 0.6rem 1rem;
            border: 1px solid #cbdbe6;
            border-radius: 40px;
            font-size: 1rem;
            width: 110px;
            background: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: 0.15s;
            font-weight: 500;
            color: #042433;
        }
        .input-row input[type="number"]:focus {
            outline: none;
            border-color: #2f7c9e;
            box-shadow: 0 0 0 3px rgba(47,124,158,0.15);
        }
        .value-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem 2rem;
            margin-top: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .value-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #eaf1f7;
            padding: 0.5rem 1.2rem 0.5rem 1.5rem;
            border-radius: 40px;
        }
        .value-item .label {
            font-weight: 500;
            color: #1d4e64;
            font-size: 0.98rem;
        }
        .value-display {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.3rem;
            color: #003153;
            border: 1px solid #bdd3e0;
            min-width: 80px;
            text-align: center;
            font-feature-settings: "tnum";
        }
        .unit {
            color: #3c657b;
            font-weight: 400;
            font-size: 0.9rem;
        }
        .param-group {
            margin-top: 1.5rem;
            padding-top: 0.8rem;
            border-top: 2px dashed #cbdde9;
        }
        .flex-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem 1.8rem;
        }
        .hyper-param {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: #eaf1f7;
            padding: 0.3rem 1.2rem 0.3rem 1.5rem;
            border-radius: 40px;
        }
        .hyper-param .label {
            font-weight: 500;
            color: #124f69;
        }
        .hyper-param input {
            width: 90px;
        }
        .info-note {
            font-size: 0.85rem;
            color: #2f6680;
            margin-top: 0.8rem;
            background: #d9eaf3;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            display: inline-block;
        }
        .action-btn {
            margin-top: 1.8rem;
            display: flex;
            justify-content: flex-end;
        }
        .btn {
            background: #1e6c8f;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 2.8rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 18px -6px #1e6c8f70;
            transition: 0.15s;
            border: 1px solid #155a7a;
            letter-spacing: 0.3px;
        }
        .btn:hover {
            background: #135d80;
            transform: scale(1.02);
            box-shadow: 0 12px 22px -8px #0b4a68;
        }
        .btn:active {
            background: #0e4b68;
            transform: scale(0.98);
        }
        .footnote {
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: #3d6379;
            text-align: center;
            border-top: 1px solid #d0e0eb;
            padding-top: 1rem;
        }
        .footnote code {
            background: #e0edf5;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #103e56;
        }
        .greek {
            font-family: 'Times New Roman', serif;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <h1>🀄️ 麻将万能牌 · 贝叶斯幸运检验</h1>
        <div class="subhead">
            <span>贝叶斯因子占位</span> 截断泊松 · 共轭先验（原型）
        </div>

        <!-- 你的数据 区块 -->
        <div class="section">
            <h2>📊 你的数据</h2>
            
            <div class="input-row">
                <label>总局数 N <i>对局数量</i></label>
                <input type="number" id="N" value="10" min="1" step="1">
            </div>
            <div class="input-row">
                <label>总万能牌数 T <i>累计摸到万能牌</i></label>
                <input type="number" id="T" value="18" min="0" step="1">
            </div>

            <div class="value-row">
                <div class="value-item">
                    <span class="label">你的平均</span>
                    <span class="value-display" id="avgDisplay">1.80</span>
                    <span class="unit">/ 局</span>
                </div>
                <div class="value-item">
                    <span class="label">理论 μ₀</span>
                    <span class="value-display" id="theoryDisplay">1.2699</span>
                    <span class="unit">/ 局</span>
                </div>
            </div>
            <div class="info-note">
                ⚙️ 平均自动计算；理论值目前为<strong>示例常数</strong> (1.2699) ，后续可替换为贝叶斯公式。
            </div>
        </div>

        <!-- 模型参数 区块 -->
        <div class="section">
            <h2>📐 模型参数</h2>

            <div class="input-row">
                <label>
                    <span class="greek">λ</span> — 截断泊松参数 <i>游戏长度</i>
                </label>
                <input type="number" id="lambda" value="45" min="0.1" step="0.5">
            </div>

            <div class="param-group">
                <div style="font-weight: 600; color: #1f4f66; margin-bottom: 1rem;">
                    先验参数 (H₁) 
                    <span style="font-weight: 400; font-size:0.9rem; background: #d2e3ed; padding: 0.2rem 0.8rem; border-radius: 30px; margin-left: 0.5rem;">Beta / Gamma 占位</span>
                </div>
                <div class="flex-row">
                    <div class="hyper-param">
                        <span class="label">α <span style="font-family: serif;">(形状)</span></span>
                        <input type="number" id="alpha" value="2.0" step="0.1" min="0.1">
                    </div>
                    <div class="hyper-param">
                        <span class="label">β <span style="font-family: serif;">(比率)</span></span>
                        <input type="number" id="beta" value="2.0" step="0.1" min="0.1">
                    </div>
                </div>
                <div style="margin-top: 0.8rem; color: #2c607b; font-size: 0.9rem;">
                    🧪 先验参数仅为占位，等待集成真实超参数。
                </div>
            </div>
        </div>

        <!-- 按钮区域：暂时只更新理论值（占位），以后可挂载真实公式 -->
        <div class="action-btn">
            <button class="btn" id="calculateBtn">🔄 运行贝叶斯检验 (公式待集成)</button>
        </div>

        <div class="footnote">
            <code>μ₀ 当前固定为 1.2699</code>  ·  修改N/T可实时计算平均  ·  底层公式后续接入
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const N_input = document.getElementById('N');
            const T_input = document.getElementById('T');
            const avgDisplay = document.getElementById('avgDisplay');
            const theoryDisplay = document.getElementById('theoryDisplay');
            const lambda_input = document.getElementById('lambda');
            const alpha_input = document.getElementById('alpha');
            const beta_input = document.getElementById('beta');
            const calcBtn = document.getElementById('calculateBtn');

            // --- 辅助函数：计算并更新平均 (T / N) ---
            function updateAverage() {
                let N = parseFloat(N_input.value);
                let T = parseFloat(T_input.value);

                // 有效性检查
                if (isNaN(N) || N <= 0) {
                    avgDisplay.textContent = 'N?';
                    return;
                }
                if (isNaN(T) || T < 0) {
                    T = 0;
                }
                const avg = T / N;
                // 保留两位小数，但不要尾随零太多
                avgDisplay.textContent = avg.toFixed(2);
            }

            // --- 占位理论函数：目前返回固定值 1.2699，但已预留所有参数接口 ---
            function placeholderTheory(N, T, lambda, alpha, beta) {
                // 🚩 这是未来你要替换的公式入口
                // 目前返回固定的示例值 (符合图片 1.2699)
                // 参数说明:
                // N : 总局数, T : 总万能牌, lambda : 截断泊松参数, alpha, beta : 先验超参数
                // 你可以在这里实现任何贝叶斯后验均值 / 后验预测 / 检验统计量
                return 1.2699;
            }

            // --- 更新理论显示 (使用占位函数) ---
            function updateTheory() {
                // 读取所有输入值 (做一次解析)
                const N = parseFloat(N_input.value) || 0;
                const T = parseFloat(T_input.value) || 0;
                const lambda = parseFloat(lambda_input.value) || 45;
                const alpha = parseFloat(alpha_input.value) || 2.0;
                const beta = parseFloat(beta_input.value) || 2.0;

                // 调用占位公式 (后续直接修改此函数即可)
                let theoryValue = placeholderTheory(N, T, lambda, alpha, beta);

                // 如果因为无效输入导致 NaN，则显示占位符
                if (isNaN(theoryValue)) {
                    theoryValue = 1.2699;  // fallback
                }

                // 格式化为保留4位小数 (图片风格)
                theoryDisplay.textContent = theoryValue.toFixed(4);
            }

            // --- 事件绑定 ---
            // 1. N, T 变化时更新平均值 (同时为了联动，可选也更新理论？但为了符合“按钮触发”，我们不自动更新理论，但可以留个口子)
            N_input.addEventListener('input', function() {
                updateAverage();
                // 如果想实现实时理论 (比如以后公式简单) 可取消下行注释
                // updateTheory();   // 默认关闭，让按钮手动更新
            });
            T_input.addEventListener('input', function() {
                updateAverage();
                // updateTheory();   // 同上，默认手动
            });

            // 2. 点击按钮更新理论值 (目前固定，但已预留参数)
            calcBtn.addEventListener('click', function() {
                updateTheory();
                // 微小的交互反馈 (可无)
                calcBtn.style.backgroundColor = '#1a5777';
                setTimeout(() => {
                    calcBtn.style.backgroundColor = '#1e6c8f';
                }, 120);
            });

            // 3. (可选) 参数输入框改变时不做自动理论更新，维持按钮触发；如果希望自动可自行打开下面监听
            // lambda_input.addEventListener('input', function() { /* 如果想自动更新取消注释 */ });
            // alpha_input.addEventListener('input', function() { /* 同上 */ });
            // beta_input.addEventListener('input', function() { /* 同上 */ });

            // 初始化平均值 (页面加载)
            updateAverage();

            // 初始化理论显示 (确保显示1.2699，即使placeholderTheory被替换也符合预期)
            // 但为了确保一致，调用一次
            updateTheory();

            // 额外：如果输入导致N为负数或空，自动修正提示 (但input已设min)
            // 可以添加简单保护
            N_input.addEventListener('blur', function() {
                let val = parseFloat(N_input.value);
                if (isNaN(val) || val < 1) {
                    N_input.value = 1;
                    updateAverage();
                }
            });
            T_input.addEventListener('blur', function() {
                let val = parseFloat(T_input.value);
                if (isNaN(val) || val < 0) {
                    T_input.value = 0;
                    updateAverage();
                }
            });
        })();
    </script>

    <!-- 简单附加说明：placeholderTheory 函数内部已预留参数，便于后续直接替换 -->
</body>
</html>
